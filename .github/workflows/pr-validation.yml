name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Formatting check (changed files only)
        run: |
          set -euo pipefail

          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" | rg '\.(ts|tsx|js|json|md|yml|yaml)$' || true)"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No matching changed files to format-check."
            exit 0
          fi

          printf "%s\n" "$CHANGED_FILES" | xargs -r npm exec -- prettier --check
