name: Publish NPM Package

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Publish workspace packages
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          publish_if_new() {
            local workspace="$1"
            local package_name package_version
            package_name=$(npm pkg get name --workspace "$workspace" | tr -d '"')
            package_version=$(npm pkg get version --workspace "$workspace" | tr -d '"')
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Package ${package_name}@${package_version} already exists on npm; skipping."
            else
              echo "Publishing ${package_name}@${package_version}..."
              npm publish --workspace "$workspace" --access public
            fi
          }
          publish_if_new "@agent-memory-cli/core"
          publish_if_new "agent-memory-cli"

      - name: Skip publish when NPM token missing
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "NPM_TOKEN secret is not configured; skipping publish."
